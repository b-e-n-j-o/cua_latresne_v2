# Blueprint Render — racine du service = dossier contenant ce fichier (cua_latresne_v4).
# Dashboard Render → Settings → Root Directory doit pointer ici si le repo est plus large.

services:
  - type: web
    name: kerelia-cua-api
    runtime: python
    region: frankfurt
    plan: starter

    buildCommand: |
      apt-get update && apt-get install -y gdal-bin libgdal-dev
      pip install -r requirements.txt

    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    autoDeploy: true

    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_HOST
        sync: false
      - key: SUPABASE_USER
        sync: false
      - key: SUPABASE_PASSWORD
        sync: false
      - key: SUPABASE_DB
        sync: false
      - key: SUPABASE_PORT
        sync: false
      - key: INTERNAL_TOKEN
        sync: false
      - key: SLACK_WEBHOOK
        sync: false
      - key: SLACK_DEPLOY_WEBHOOK
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: GOOGLE_API_KEY
        sync: false

  # Cron ETL quotidien (UTC). Communes : config/etl_communes.json
  # Si le Blueprint échoue sur le cron : créer le job à la main (Dashboard → New → Cron Job).
  - type: cron
    name: etl-communes-daily
    runtime: python
    region: frankfurt
    schedule: "0 3 * * *"
    buildCommand: |
      apt-get update && apt-get install -y gdal-bin libgdal-dev
      pip install -r requirements.txt
    startCommand: bash services/ingestion_cadastre/scripts/render_cron_etl_latresne.sh
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.8
      - key: SUPABASE_HOST
        sync: false
      - key: SUPABASE_USER
        sync: false
      - key: SUPABASE_PASSWORD
        sync: false
      - key: SUPABASE_DB
        sync: false
      - key: SUPABASE_PORT
        sync: false
      - key: SLACK_WEBHOOK
        sync: false
      - key: SLACK_DEPLOY_WEBHOOK
        sync: false
